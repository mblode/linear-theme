# Linear Light — Alacritty
# Import in alacritty.toml: general.import = ["~/.config/alacritty/themes/linear-light.toml"]

[colors.primary]
background = "#ffffff"
foreground = "#303032"

[colors.cursor]
cursor = "#6d78d5"
text = "#ffffff"

[colors.selection]
background = "#edeef8"
text = "#303032"

[colors.normal]
black = "#303032"
red = "#e2253b"
green = "#008e09"
yellow = "#957100"
blue = "#007fff"
magenta = "#8e54cb"
cyan = "#0093ba"
white = "#e4e4e4"

[colors.bright]
black = "#5e5e60"
red = "#f34e52"
green = "#27a644"
yellow = "#d8a900"
blue = "#2bb7ff"
magenta = "#ce55b0"
cyan = "#00a2b6"
white = "#f9f9f9"
